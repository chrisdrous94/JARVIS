<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. - Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap');

        :root {
            --jarvis-blue: #00d2ff;
            --jarvis-glow: rgba(0, 210, 255, 0.6);
            --bg-dark: #050a0f;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--jarvis-blue);
            font-family: 'Roboto Mono', monospace;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 4rem;
            padding-bottom: 2rem;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(0, 210, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Arc Reactor Visualizer */
        .arc-reactor {
            position: relative;
            width: 160px;
            height: 160px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }

        .arc-reactor:hover { transform: scale(1.05); }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--jarvis-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--jarvis-glow), inset 0 0 15px var(--jarvis-glow);
        }

        .outer-ring {
            width: 150px;
            height: 150px;
            border-style: dashed;
            animation: rotate-clockwise 15s linear infinite;
        }

        .middle-ring {
            width: 100px;
            height: 100px;
            border-width: 3px;
            border-style: double;
            animation: rotate-counter 10s linear infinite;
        }

        .inner-core {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #fff 0%, var(--jarvis-blue) 60%, transparent 100%);
            box-shadow: 0 0 35px var(--jarvis-blue);
            transition: all 0.5s ease;
        }

        .listening .inner-core {
            background: radial-gradient(circle, #fff 0%, #ff0055 60%, transparent 100%);
            box-shadow: 0 0 45px #ff0055;
            animation: pulse 1.2s infinite;
        }

        @keyframes rotate-clockwise { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes rotate-counter { from { transform: translate(-50%, -50%) rotate(360deg); } to { transform: translate(-50%, -50%) rotate(0deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        .hud-panel {
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .terminal-log::-webkit-scrollbar { width: 4px; }
        .terminal-log::-webkit-scrollbar-track { background: transparent; }
        .terminal-log::-webkit-scrollbar-thumb { background: var(--jarvis-blue); border-radius: 10px; }

        .btn-action {
            border: 1px solid var(--jarvis-blue);
            padding: 10px 16px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.65rem;
            background: rgba(0, 0, 0, 0.4);
            white-space: nowrap;
        }

        .btn-action:hover {
            background: var(--jarvis-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--jarvis-blue);
        }

        .btn-active {
            background: var(--jarvis-blue) !important;
            color: var(--bg-dark) !important;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 100;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
    </style>
</head>
<body class="p-4">
    <div class="scanline"></div>

    <!-- HUD Overlay -->
    <div class="fixed top-4 left-4 right-4 flex justify-between orbitron text-[9px] opacity-70 tracking-widest z-50">
        <div class="flex flex-col gap-1">
            <div>STATUS: <span id="status-tag" class="text-green-400">ONLINE</span></div>
            <div id="clock">TIME: --:--:--</div>
            <div>WAKE-WORD: <span id="wake-status" class="text-red-500 font-bold">DISABLED</span></div>
        </div>
        <div class="text-right flex flex-col gap-1">
            <div>V: 5.2.0-STABLE</div>
            <div>UPLINK: <span id="uplink-status">ACTIVE</span></div>
            <div>MODE: <span id="mode-text">MANUAL</span></div>
        </div>
    </div>

    <!-- Main Visual -->
    <div class="flex flex-col items-center gap-4 mb-6 mt-12 w-full">
        <div class="arc-reactor" id="mainCore">
            <div class="ring outer-ring"></div>
            <div class="ring middle-ring"></div>
            <div class="ring inner-core"></div>
        </div>
        
        <div class="text-center">
            <h1 class="orbitron text-2xl font-bold tracking-[0.3em] mb-1">J.A.R.V.I.S.</h1>
            <p id="transcript" class="italic text-xs opacity-50 min-h-[1rem]">"Standing by, Sir."</p>
        </div>
    </div>

    <!-- UI Interface -->
    <div class="w-full max-w-xl px-2">
        <div class="hud-panel p-4 mb-4 h-48 overflow-y-auto terminal-log flex flex-col-reverse" id="chatWindow">
            <div id="msgBuffer"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="flex gap-2">
                <input type="text" id="commandInput" placeholder="Direct neural entry..." 
                       class="w-full bg-black/50 border-b border-cyan-500/30 p-2 text-sm outline-none focus:border-cyan-400 transition-colors text-cyan-400">
                <button id="sendBtn" class="btn-action orbitron">Send</button>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button id="voiceBtn" class="btn-action orbitron">Listen Once</button>
                <button id="continuousBtn" class="btn-action orbitron">Always Listening</button>
                <button id="resetBtn" class="btn-action orbitron opacity-50">Clear</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBOjq2a_bUufFwZI3rnAxrLngved-secNs";
        const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        const core = document.getElementById('mainCore');
        const statusTag = document.getElementById('status-tag');
        const wakeStatus = document.getElementById('wake-status');
        const modeText = document.getElementById('mode-text');
        const transcript = document.getElementById('transcript');
        const msgBuffer = document.getElementById('msgBuffer');
        const chatWindow = document.getElementById('chatWindow');
        const commandInput = document.getElementById('commandInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const continuousBtn = document.getElementById('continuousBtn');
        const uplinkStatus = document.getElementById('uplink-status');

        let isAlwaysListening = false;
        let isProcessing = false;

        // --- HUD Clock ---
        setInterval(() => {
            document.getElementById('clock').innerText = `TIME: ${new Date().toLocaleTimeString()}`;
        }, 1000);

        // --- Speech Recognition ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognizer;

        if (Recognition) {
            recognizer = new Recognition();
            recognizer.continuous = false;
            recognizer.lang = 'en-US';

            recognizer.onstart = () => {
                core.classList.add('listening');
                statusTag.innerText = 'LISTENING';
                transcript.innerText = isAlwaysListening ? 'Awaiting "Jarvis"...' : 'Listening...';
            };

            recognizer.onresult = (e) => {
                const text = e.results[0][0].transcript;
                transcript.innerText = `"${text}"`;
                
                if (isAlwaysListening) {
                    if (text.toLowerCase().includes('jarvis')) {
                        const command = text.toLowerCase().split('jarvis').pop().trim();
                        if (command) {
                            addLog("USER", text);
                            handleInput(command);
                        } else {
                            speak("Yes, Sir? Standing by.");
                        }
                    } else {
                        restartListening();
                    }
                } else {
                    addLog("USER", text);
                    handleInput(text);
                }
            };

            recognizer.onend = () => {
                core.classList.remove('listening');
                statusTag.innerText = 'ONLINE';
                if (isAlwaysListening && !isProcessing) {
                    restartListening();
                }
            };

            recognizer.onerror = (e) => {
                console.error("Speech Rec Error:", e.error);
                if (isAlwaysListening) restartListening();
            };
        }

        function restartListening() {
            if (isAlwaysListening && !isProcessing) {
                setTimeout(() => {
                    try { recognizer.start(); } catch(e) {}
                }, 350);
            }
        }

        // --- Speech Synthesis ---
        function speak(text) {
            isProcessing = true;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => (v.name.includes('Google UK English Male') || v.lang === 'en-GB') && v.name.includes('Male')) || voices[0];
            if (preferred) utterance.voice = preferred;
            
            utterance.pitch = 0.9;
            utterance.rate = 1.0;

            utterance.onend = () => {
                isProcessing = false;
                if (isAlwaysListening) restartListening();
            };

            window.speechSynthesis.speak(utterance);
            addLog("JARVIS", text);
        }

        function addLog(sender, text) {
            const row = document.createElement('div');
            row.className = 'mb-3 border-l border-cyan-500/30 pl-3 py-1';
            row.innerHTML = `<span class="text-[8px] block opacity-40 orbitron tracking-widest">${sender}</span><p class="text-sm leading-relaxed">${text}</p>`;
            msgBuffer.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleInput(cmd) {
            const query = cmd.toLowerCase();

            if (query.includes('time')) {
                speak(`The time is ${new Date().toLocaleTimeString()}, Sir.`);
                return;
            }
            if (query.includes('open google')) {
                speak("Opening Google search, Sir.");
                window.open('https://google.com', '_blank');
                return;
            }
            if (query.includes('stop listening')) {
                toggleContinuous(false);
                speak("Always-listening mode deactivated.");
                return;
            }

            statusTag.innerText = 'THINKING';
            await callNeuralNetwork(cmd);
            statusTag.innerText = 'ONLINE';
        }

        async function callNeuralNetwork(prompt) {
            try {
                const response = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "You are JARVIS. Sophisticated, brief, professional. Address user as Sir." }] }
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `Status ${response.status}`);
                }

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Signal disrupted, Sir.";
                speak(reply);
            } catch (err) {
                console.error(err);
                addLog("ERROR", `Neural Error: ${err.message}`);
                speak("I'm having trouble with the neural link, Sir. Please check the logs.");
                uplinkStatus.innerText = "ERROR";
                uplinkStatus.className = "text-red-500";
            }
        }

        function toggleContinuous(force) {
            isAlwaysListening = force !== undefined ? force : !isAlwaysListening;
            
            if (isAlwaysListening) {
                continuousBtn.classList.add('btn-active');
                wakeStatus.innerText = 'ACTIVE';
                wakeStatus.className = 'text-green-400 font-bold';
                modeText.innerText = 'VOICE_CONV';
                try { recognizer.start(); } catch(e) {}
            } else {
                continuousBtn.classList.remove('btn-active');
                wakeStatus.innerText = 'DISABLED';
                wakeStatus.className = 'text-red-500 font-bold';
                modeText.innerText = 'MANUAL';
                try { recognizer.stop(); } catch(e) {}
            }
        }

        voiceBtn.addEventListener('click', () => {
            isAlwaysListening = false;
            continuousBtn.classList.remove('btn-active');
            if (recognizer) {
                try { recognizer.start(); } catch(e) {}
            }
        });

        continuousBtn.addEventListener('click', () => toggleContinuous());

        core.addEventListener('click', () => {
            if (!isAlwaysListening) voiceBtn.click();
            else toggleContinuous(false);
        });

        document.getElementById('sendBtn').addEventListener('click', () => {
            const val = commandInput.value.trim();
            if (val) {
                addLog("USER", val);
                handleInput(val);
                commandInput.value = '';
            }
        });

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            msgBuffer.innerHTML = '';
            transcript.innerText = '"HUD reset complete."';
        });

        window.onload = () => {
            setTimeout(() => {
                speak("Systems stabilized. Standing by for commands.");
            }, 800);
        };
    </script>
</body>
</html>
